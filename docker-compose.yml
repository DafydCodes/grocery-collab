services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: grocery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DafydPaul@13092006
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    depends_on: [ db ]
    environment:
      DATABASE_URL: postgres://postgres:DafydPaul@13092006@db:5433/grocery
      JWT_SECRET: dafydpaul
    ports:
      - "3001:3001"

volumes:
  pgdata:
